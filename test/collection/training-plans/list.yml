info:
  name: list
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:8000/api/training-plans?query={"name":{"$regex":"xp","$options":"i"}}&fields=name
  params:
    - name: query
      value: '{"name":{"$regex":"xp","$options":"i"}}'
      type: query
    - name: fields
      value: name
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setVar("trainingPlan", res.body)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
