services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "127.0.0.1/test", "--eval", "quit(db.runCommand({ping:1}).ok ? 0 : 2)"]
      interval: 10s
      timeout: 1s
      retries: 3
      start_period: 500ms
  workout-api:
    build: ../application
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 10s
      timeout: 1s
      retries: 3
      start_period: 10s
volumes:
  mongo_data: null
