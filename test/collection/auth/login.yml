info:
  name: login
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:8000/auth/tokens
  body:
    type: form-urlencoded
    data:
      - name: username
        value: "{{user.username}}"
      - name: password
        value: "{{user.password}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setVar("token", res.body)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
